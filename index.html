<script type="text/javascript">function removeDoubleSlashes(url) {
  // Behåll https:// korrekt, men ta bort alla extra snedstreck efter domänen
  return url.replace(/([^:]\/)\/+/g, '$1');
}

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', function(e) {
      const href = this.getAttribute('href'); // ta originalattributet
      if (!href) return;

      e.preventDefault();

      // Bygg absolut URL
      const fullUrl = new URL(href, window.location.origin).href;

      // Rensa dubbla snedstreck
      const cleanUrl = removeDoubleSlashes(fullUrl);

      window.location.href = cleanUrl;
    });
  });

  // Default title/alt på bilder
  document.querySelectorAll('img').forEach(img => {
    if (!img.title) img.title = '© Lahi';
    if (!img.alt) img.alt = '© Lahi';
  });
});
